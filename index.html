<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Space+Grotesk:wght@300..700&display=swap"
        rel="stylesheet">
    <style type="text/tailwindcss">

        @theme{
            /* colors */
            --color-black:#0D1117;
            --color-blue:#ACC7FF;
            --color-dark:#6B7280;
            --color-white:#F0F0F2;

            /* fonts */
            --font-space-grotesk: Space Grotesk sans-serif;
            --font-mono:JetBrains Mono monospace;;
        }
    </style>
</head>

<body>
    <header class="bg-black">
        <div class="flex justify-between">
            <div>
                <h1
                    class="font-space-grotesk font-bold text-blue text-[28px] leading-[40px] tracking-[-1.6px] mx-[28px] py-[19.5px]">
                    CodeArena</h1>
            </div>
            <button class="flex gap-[6px] font-mono w-fit h-fit border border-white rounded-[8px] px-[17px] py-[7px] my-[19.5px] text-white">
                <img src="./images/icon.png" alt="icon" class="w-[12px] h-[12px] mt-[6px]">
                Admin
            </button>
        </div>
    </header>
</body>
