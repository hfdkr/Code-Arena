<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeArena - Quiz</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-straight/css/uicons-solid-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        systemBackground: '#0D1117',
                        cardSurface: '#161B22',
                        brandBlue: '#5c8dff',
                        brandBlueHover: '#4a7be6',
                        accentPill: '#A5C8FF',
                        textMuted: '#8B949E',
                        borderSubtle: '#30363D',
                        successBorder: '#238636',
                        successGlow: '#2ea043',
                        errorRed: '#f85149'
                    },
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0D1117;
            color: #F0F0F2;
        }
    </style>
</head>
<body class="min-h-screen font-sans flex flex-col items-center">

    <header class="w-full flex justify-between items-center px-6 py-8">
        <h1 class="font-bold text-accentPill text-2xl tracking-tight">CodeArena</h1>
        <div class="flex items-center gap-4">
            <a href="arena.html" class="flex items-center justify-center border border-borderSubtle rounded-lg w-11 h-11 hover:bg-white/5 transition-colors text-textMuted hover:text-white">
                <i class="fi fi-rr-home mt-1 text-lg"></i>
            </a>
        </div>
    </header>

    <main class="w-full max-w-5xl px-6 pb-16 flex flex-col md:flex-row gap-12 md:gap-20 mt-8">
        
        <div class="flex-1 flex flex-col justify-start">
            <p id="tracker" class="font-mono tracking-widest uppercase text-sm text-textMuted mb-4">Question 1 of ...</p>
            <h2 id="question" class="text-3xl md:text-4xl font-bold mb-12 leading-tight">Loading question...</h2>
            
            <div class="w-full bg-borderSubtle rounded-full h-3 mt-auto mb-8 md:mb-0">
                <div id="progress" class="bg-brandBlue h-3 rounded-full transition-all duration-300" style="width: 0%;"></div>
            </div>
        </div>

        <div class="flex-1 flex flex-col">
            <div id="options-container" class="flex flex-col gap-4">
                </div>
            
            <button id="main-btn" class="w-full py-4 mt-8 bg-brandBlue hover:bg-brandBlueHover transition-colors rounded-xl font-bold text-lg text-systemBackground flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(92,141,255,0.2)]">
                Submit Answer
            </button>
            <p id="error-msg" class="text-errorRed text-center mt-4 hidden font-mono text-sm flex justify-center items-center gap-2">
                <i class="fi fi-rr-triangle-warning"></i> Please select an answer
            </p>
        </div>
    </main>

    <script src="data.js"></script>
    
    <script>
        // Only the basic display logic remains
        const params = new URLSearchParams(location.search);
        const subject = params.get("subject") || "HTML"; 
        const quiz = quizData[subject];
        let i = 0; // Starts at the first question

        function load() {
            const q = quiz.questions[i];
            
            document.getElementById("tracker").textContent = `Question ${i + 1} of ${quiz.questions.length}`;
            document.getElementById("question").textContent = q.question;
            document.getElementById("progress").style.width = ((i + 1) / quiz.questions.length) * 100 + "%";
            
            const container = document.getElementById("options-container");
            container.innerHTML = "";

            q.options.forEach((opt, idx) => {
                const letter = String.fromCharCode(65 + idx); 
                const btn = document.createElement("button");
                
                btn.className = "quiz-option group w-full flex items-center p-4 rounded-xl border-2 border-borderSubtle bg-cardSurface text-left hover:border-textMuted transition-colors cursor-pointer shadow-[0_0_10px_rgba(255,255,255,0.05)]";
                
                btn.innerHTML = `
                    <div class="option-letter flex items-center justify-center w-10 h-10 rounded-lg bg-white/5 text-textMuted font-mono font-bold mr-4">${letter}</div>
                    <span class="option-text text-base md:text-lg font-medium text-gray-200">${opt.trim() === "" ? "None of the above" : opt}</span>
                `;
                
                container.appendChild(btn);
            });
        }

        load();
    </script>
</body>
</html>
