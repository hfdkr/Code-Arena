<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeArena - Quiz</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-straight/css/uicons-solid-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        systemBackground: '#0D1117',
                        cardSurface: '#161B22',
                        brandBlue: '#5c8dff',
                        brandBlueHover: '#4a7be6',
                        accentPill: '#A5C8FF',
                        textMuted: '#8B949E',
                        borderSubtle: '#30363D',
                        successBorder: '#238636',
                        successGlow: '#2ea043',
                        errorRed: '#f85149'
                    },
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0D1117;
            color: #F0F0F2;
        }
    </style>
</head>
<body class="min-h-screen font-sans flex flex-col items-center">

    <header class="w-full flex justify-between items-center px-6 py-6 md:py-8">
        <h1 class="font-bold text-accentPill text-xl md:text-2xl tracking-tight">CodeArena</h1>
        <div class="flex items-center gap-4">
            <a href="arena.html" class="flex items-center justify-center border border-borderSubtle rounded-lg w-10 h-10 md:w-11 md:h-11 hover:bg-white/5 transition-colors text-textMuted hover:text-white">
                <i class="fi fi-rr-home mt-1 text-base md:text-lg"></i>
            </a>
        </div>
    </header>

    <main class="w-full max-w-2xl mx-auto px-4 pt-2 pb-16 flex flex-col">
        
        <div class="flex justify-between items-center mb-8 md:mb-10">
            <div class="flex items-center gap-2 bg-cardSurface border border-borderSubtle rounded-full px-4 py-2 shadow-sm">
                <i class="fi fi-ss-star text-xs mt-0.5"></i>
                <span id="scoreDisplay" class="text-xs md:text-sm font-mono text-gray-300 font-bold tracking-wide">0 pts</span>
            </div>
            <div id="timerDisplay" class="w-12 h-12 md:w-14 md:h-14 rounded-full border-[3px] border-brandBlue flex items-center justify-center text-brandBlue font-mono font-bold text-base md:text-lg shadow-[0_0_15px_rgba(92,141,255,0.2)]">
                30
            </div>
        </div>

        <div class="mb-6 md:mb-8">
            <div class="flex justify-between text-[10px] md:text-xs font-mono text-textMuted mb-3 tracking-widest uppercase">
                <span id="tracker">Question 1 / 10</span>
                <span id="remaining" class="text-gray-400 lowercase">9 restantes</span>
            </div>
            <div class="w-full h-1 md:h-1.5 bg-borderSubtle rounded-full overflow-hidden">
                <div id="progress" class="h-full bg-gradient-to-r from-brandBlue to-successGlow transition-all duration-300" style="width: 0%;"></div>
            </div>
        </div>

        <div class="bg-cardSurface border border-borderSubtle rounded-[20px] md:rounded-[24px] p-6 md:p-10 shadow-2xl">
            

            <!-- Subject & Difficulty Tags -->
            <div class="flex flex-wrap gap-2 md:gap-3 mb-6 md:mb-8">
                <span id="tag-subject" class="px-3 py-1 md:px-4 md:py-1.5 rounded-full border border-borderSubtle bg-white/5 text-[10px] md:text-xs font-mono text-brandBlue tracking-wider">HTML</span>
                <span id="tag-difficulty" class="px-3 py-1 md:px-4 md:py-1.5 rounded-full border border-borderSubtle bg-white/5 text-[10px] md:text-xs font-mono text-successGlow tracking-wider">Facile</span>
            </div>
            
            <h2 id="question" class="text-xl md:text-[28px] leading-relaxed md:leading-snug font-bold text-white mb-8 md:mb-10">
                Loading question...
            </h2>
            
            <div id="options-container" class="flex flex-col gap-3 md:gap-4">
                </div>
        </div>

        <div class="mt-6 md:mt-8 flex justify-start">
            <button id="skipBtn" class="px-6 py-2.5 md:px-8 md:py-3 rounded-xl border border-borderSubtle text-xs md:text-sm font-mono text-gray-300 hover:text-white hover:bg-white/5 transition-all">
                Passer
            </button>
        </div>

    </main>

    <script src="data.js"></script>
    <script src="quiz.js"></script>
</body>
</html>
